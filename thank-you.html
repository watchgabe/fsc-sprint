<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>You're In — FSCreative Brand Launch Sprint</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; }
body {
  background: #0a0a0a;
  color: #f0f0f0;
  font-family: 'Barlow', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  min-height: 100dvh;
  padding: 40px 24px;
  text-align: center;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 64px;
  text-decoration: none;
}
.logo-icon {
  width: 32px; height: 32px;
  background: #f0601b;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
}
.logo-icon svg { width: 18px; height: 18px; fill: white; }
.logo-text {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 17px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 1px;
  color: #f0f0f0;
}
.eyebrow {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 2px;
  color: #f0601b;
  margin-bottom: 20px;
}
h1 {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: clamp(52px, 10vw, 96px);
  font-weight: 900;
  text-transform: uppercase;
  line-height: 1;
  letter-spacing: -2px;
  color: #f0f0f0;
  margin-bottom: 24px;
}
h1 span { color: #f0601b; }
p {
  font-size: 17px;
  color: rgba(240,240,240,0.55);
  line-height: 1.65;
  max-width: 480px;
  margin: 0 auto 40px;
}
.btn {
  display: inline-block;
  background: #f0601b;
  color: white;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 16px 36px;
  border-radius: 6px;
  text-decoration: none;
  transition: opacity 0.2s;
}
.btn:hover { opacity: 0.85; }
.divider {
  width: 48px; height: 2px;
  background: #f0601b;
  margin: 0 auto 40px;
  opacity: 0.4;
}
</style>
</head>
<body>

  <a href="https://fscreative.live" class="logo">
    <img src="https://fscreative.live/FSC%20Orange%20White%20no%20TM@4x.png" height="20" alt="FSCreative">
  </a>

  <div class="eyebrow">Brand Launch Sprint</div>
  <h1>You're <span>In.</span></h1>
  <div class="divider"></div>
  <p>Welcome to the sprint. Check your email for next steps, then head into the community to introduce yourself.</p>
  <a href="https://fscreative.circle.so" class="btn">Access the Community →</a>

</body>
</html>
